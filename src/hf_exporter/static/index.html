<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HF Model Exporter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Light mode */
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #f1f5f9;
      --bg-row-alt: #f8fbff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #64748b;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      
      --accent-primary: #0066cc;
      --accent-primary-hover: #004f9e;
      --accent-secondary: #10b981;
      --accent-tertiary: #f59e0b;
      --danger: #ef4444;
      --success: #10b981;
      --link-color: #0057d8;
      --link-hover: #003f9f;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html[data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --bg-row-alt: #162236;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-tertiary: #94a3b8;
      --border: #334155;
      --border-light: #1e293b;
      
      --accent-primary: #3b82f6;
      --accent-primary-hover: #2563eb;
      --accent-secondary: #10b981;
      --accent-tertiary: #fbbf24;
      --danger: #f87171;
      --success: #10b981;
      --link-color: #93c5fd;
      --link-hover: #bfdbfe;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-primary);
      background: var(--bg-secondary);
      transition: var(--transition);
      line-height: 1.6;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      gap: 16px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
    }

    .nav-link:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .page-layout {
      display: grid;
      grid-template-columns: minmax(250px, 300px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .content-stack {
      min-width: 0;
    }

    .summary-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .summary-stat {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }

    .summary-stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .summary-stat-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .summary-list {
      list-style: none;
      display: grid;
      gap: 8px;
      max-height: 420px;
      overflow: auto;
    }

    .summary-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      background: var(--bg-secondary);
    }

    .summary-item-model {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text-primary);
      word-break: break-word;
    }

    .summary-item-meta {
      margin-top: 4px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--text-secondary);
      font-size: 0.78rem;
    }

    .header-content h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text-primary);
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }

    .theme-toggle:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--accent-primary);
    }

    .theme-toggle button {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      transition: var(--transition);
      font-size: 1.2rem;
      color: var(--text-secondary);
    }

    .theme-toggle button.active {
      background: var(--bg-tertiary);
      color: var(--accent-primary);
    }

    .card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
      transition: var(--transition);
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-light);
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      margin-bottom: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select, textarea {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: var(--transition);
    }

    input::placeholder, select::placeholder, textarea::placeholder {
      color: var(--text-tertiary);
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
      background: var(--bg-primary);
    }

    html[data-theme="dark"] input:focus,
    html[data-theme="dark"] select:focus,
    html[data-theme="dark"] textarea:focus {
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    button {
      padding: 10px 16px;
      border: 1.5px solid transparent;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    button:active {
      transform: scale(0.98);
    }

    .primary {
      background: var(--accent-primary);
      color: #ffffff;
      border-color: var(--accent-primary);
    }

    .primary:hover {
      opacity: 0.9;
      box-shadow: var(--shadow-md);
    }

    .primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .secondary {
      background: var(--accent-primary);
      color: #ffffff;
      border-color: var(--accent-primary);
    }

    .secondary:hover {
      background: var(--accent-primary-hover);
      border-color: var(--accent-primary-hover);
      box-shadow: var(--shadow-md);
    }

    .secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .danger {
      background: transparent;
      color: var(--danger);
      border-color: var(--danger);
    }

    .danger:hover {
      background: var(--danger);
      color: white;
      box-shadow: var(--shadow-md);
    }

    .action-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .action-section {
      background: var(--bg-tertiary);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .action-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: block;
    }

    .action-section .action-row {
      gap: 8px;
      margin-bottom: 0;
    }

    .message-box {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 12px;
      border-left: 4px solid transparent;
    }

    .muted {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border-left-color: var(--accent-primary);
    }

    .error {
      background: var(--danger);
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border-left-color: var(--danger);
      font-weight: 600;
    }

    .success {
      background: var(--success);
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border-left-color: var(--success);
      font-weight: 600;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-sm);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 900px;
      background: var(--bg-primary);
    }

    th {
      background: var(--bg-tertiary);
      border-bottom: 2px solid var(--border);
      padding: 12px;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      border-bottom: 1px solid var(--border);
      padding: 12px;
      font-size: 0.92rem;
      color: var(--text-primary);
    }

    td.model-cell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .model-cell-main {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .model-id-text {
      word-break: break-word;
    }

    .note-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .note-badge,
    .ranking-badge,
    .note-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .ranking-badge {
      background: rgba(16, 185, 129, 0.12);
      color: var(--success);
    }

    tbody tr {
      transition: var(--transition);
    }

    tbody tr:nth-child(even) {
      background: var(--bg-row-alt);
    }

    tbody tr:hover {
      background: var(--bg-tertiary);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    th button {
      border: none;
      background: transparent;
      font-weight: 700;
      padding: 0;
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
    }

    th button:hover {
      color: var(--accent-primary);
    }

    a {
      color: var(--link-color);
      text-decoration: none;
      transition: var(--transition);
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
      color: var(--link-hover);
      opacity: 1;
    }

    .external-link-icon {
      font-size: 0.8em;
      margin-left: 4px;
      vertical-align: text-top;
      opacity: 0.85;
      transition: var(--transition);
    }

    a:hover .external-link-icon {
      opacity: 1;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
      flex-wrap: wrap;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .status {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .pagination-controls {
      display: flex;
      gap: 8px;
    }

    .pagination-controls button {
      padding: 8px 12px;
      font-size: 0.85rem;
    }

    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .action-row {
        gap: 8px;
      }

      button {
        padding: 10px 12px;
        font-size: 0.85rem;
      }

      .footer {
        flex-direction: column;
        align-items: stretch;
      }

      .pagination-controls {
        width: 100%;
      }

      .pagination-controls button {
        flex: 1;
      }

      .container {
        padding: 16px 12px;
      }

      .header-content h1 {
        font-size: 1.5rem;
      }

      table {
        min-width: 100%;
        font-size: 0.85rem;
      }

      th, td {
        padding: 8px;
      }
    }

    /* Detail panel */
    .panel-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .panel-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: 400px;
      max-width: 95vw;
      background: var(--bg-primary);
      border-left: 1px solid var(--border);
      box-shadow: var(--shadow-xl);
      z-index: 101;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .detail-panel.open {
      transform: translateX(0);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-primary);
      z-index: 1;
    }

    .panel-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .panel-close {
      background: transparent;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--text-tertiary);
      padding: 4px 8px;
      border-radius: 6px;
      line-height: 1;
    }

    .panel-close:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .panel-body {
      padding: 24px;
      flex: 1;
    }

    .panel-section {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .panel-section-title {
      font-size: 0.86rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-grid .field {
      gap: 8px;
    }

    .panel-grid .field.full {
      grid-column: 1 / -1;
    }

    .panel-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .panel-note-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-note-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      background: var(--bg-secondary);
    }

    .panel-note-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .panel-note-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .panel-note-created {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      white-space: nowrap;
    }

    .panel-note-block {
      margin-top: 8px;
    }

    .panel-note-block strong {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .panel-note-block p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .panel-helper-text {
      font-size: 0.8rem;
      color: var(--text-tertiary);
      margin-top: 6px;
    }

    .panel-empty {
      color: var(--text-tertiary);
      font-size: 0.9rem;
      padding: 14px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: var(--bg-secondary);
    }

    .panel-field {
      margin-bottom: 20px;
    }

    .panel-field-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .panel-field-value {
      font-size: 0.95rem;
      color: var(--text-primary);
      font-weight: 500;
      word-break: break-all;
    }

    .panel-hf-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 10px 18px;
      background: var(--accent-primary);
      color: #ffffff !important;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none !important;
      transition: var(--transition);
    }

    .panel-hf-link:hover {
      background: var(--accent-primary-hover);
      box-shadow: var(--shadow-md);
      text-decoration: none !important;
    }

    tbody tr.clickable-row {
      cursor: pointer;
    }

    tbody tr.clickable-row:hover td.model-cell .row-indicator {
      color: var(--accent-primary);
      transform: translateX(2px);
    }

    .row-indicator {
      color: var(--text-tertiary);
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1;
      transition: var(--transition);
      flex-shrink: 0;
    }

    @media (max-width: 960px) {
      .page-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .panel-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <h1>🤗 Model Exporter</h1>
        <p class="subtitle">Search Hugging Face models with advanced filtering and export</p>
      </div>
      <div class="header-actions">
        <a class="nav-link" href="/records">Records Manager</a>
        <div class="theme-toggle" id="theme-toggle">
          <button id="light-mode" class="active" title="Light mode">☀️</button>
          <button id="dark-mode" title="Dark mode">🌙</button>
        </div>
      </div>
    </div>

    <div class="page-layout">
      <aside class="card">
        <h2 style="font-size: 1rem; margin-bottom: 10px;">Stored Records</h2>
        <div class="summary-stats">
          <div class="summary-stat">
            <div class="summary-stat-label">Entries</div>
            <div class="summary-stat-value" id="summary-total-records">0</div>
          </div>
          <div class="summary-stat">
            <div class="summary-stat-label">Models</div>
            <div class="summary-stat-value" id="summary-total-models">0</div>
          </div>
        </div>
        <ul class="summary-list" id="summary-top-models">
          <li class="summary-item">No stored records yet.</li>
        </ul>
      </aside>

      <div class="content-stack">

    <div class="card">
      <div class="grid">
        <div class="field">
          <label for="query">Query</label>
          <input id="query" placeholder="llama, bert, etc." />
        </div>
        <div class="field">
          <label for="task">Task</label>
          <input id="task" placeholder="text-generation" />
        </div>
        <div class="field">
          <label for="author">Author</label>
          <input id="author" placeholder="openai, meta" />
        </div>
        <div class="field">
          <label for="library">Library</label>
          <input id="library" placeholder="transformers" />
        </div>

        <div class="field">
          <label for="min-downloads">Min Downloads</label>
          <input id="min-downloads" type="number" min="0" />
        </div>

  <!-- Detail slide-in panel -->
  <div class="panel-backdrop" id="panel-backdrop"></div>
  <div class="detail-panel" id="detail-panel" role="dialog" aria-modal="true" aria-label="Model details">
    <div class="panel-header">
      <span class="panel-title">Model Details</span>
      <button class="panel-close" id="panel-close" title="Close">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

  <script>
    function initTheme() {
      const savedTheme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
      updateThemeButtons(savedTheme);
    }

    function updateThemeButtons(theme) {
      document.getElementById("light-mode").classList.toggle("active", theme === "light");
      document.getElementById("dark-mode").classList.toggle("active", theme === "dark");
    }

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
      updateThemeButtons(theme);
    }

    document.getElementById("light-mode").addEventListener("click", () => setTheme("light"));
    document.getElementById("dark-mode").addEventListener("click", () => setTheme("dark"));

    if (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches) {
      setTheme("dark");
    }

    initTheme();

    const STORAGE_KEY = "hfExporterState";
    const DEBOUNCE_MS = 300;

    const state = {
      hasData: false,
      isLoading: false,
      cacheKey: "",
      page: 1,
      pageSize: 25,
      totalPages: 1,
      sortBy: "downloads",
      sortDir: "desc",
      task: "",
      author: "",
      library: "",
      minDownloads: "",
      maxDownloads: "",
      minLikes: "",
      maxLikes: "",
      noteRole: "",
      noteCategory: "",
      noteModelType: "",
      noteText: "",
      minRanking: "",
      maxRanking: "",
      noteOptions: null,
      activeModel: null,
    };

    let searchController = null;
    let resultsController = null;
    let applyDebounceTimer = null;

    const queryInput = document.getElementById("query");
    const taskInput = document.getElementById("task");
    const authorInput = document.getElementById("author");
    const libraryInput = document.getElementById("library");
    const pageSizeInput = document.getElementById("page-size");
    const minDownloadsInput = document.getElementById("min-downloads");
    const maxDownloadsInput = document.getElementById("max-downloads");
    const minLikesInput = document.getElementById("min-likes");
    const maxLikesInput = document.getElementById("max-likes");
    const noteRoleInput = document.getElementById("note-role");
    const noteCategoryInput = document.getElementById("note-category");
    const noteModelTypeInput = document.getElementById("note-model-type");
    const minRankingInput = document.getElementById("min-ranking");
    const maxRankingInput = document.getElementById("max-ranking");
    const noteTextInput = document.getElementById("note-text");
    const messageEl = document.getElementById("message");
    const errorEl = document.getElementById("error");
    const statusEl = document.getElementById("status");
    const resultsBody = document.getElementById("results-body");
    const panelBody = document.getElementById("panel-body");
    const summaryTotalRecordsEl = document.getElementById("summary-total-records");
    const summaryTotalModelsEl = document.getElementById("summary-total-models");
    const summaryTopModelsEl = document.getElementById("summary-top-models");

    const managedButtons = [
      "search-btn",
      "apply-btn",
      "reset-btn",
      "prev-page",
      "next-page",
      "export-full-json",
      "export-full-csv",
      "export-filtered-json",
      "export-filtered-csv",
    ].map((id) => document.getElementById(id));

    function setLoading(isLoading) {
      state.isLoading = isLoading;
      for (const button of managedButtons) {
        if (button) {
          button.disabled = isLoading;
        }
      }
    }

    function setMessage(text) {
      messageEl.textContent = text;
      messageEl.style.display = "block";
      errorEl.style.display = "none";
    }

    function setError(text) {
      if (text) {
        errorEl.textContent = text;
        errorEl.style.display = "block";
        messageEl.style.display = "none";
      } else {
        errorEl.style.display = "none";
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function buildSelectOptions(values, selectedValue, placeholder) {
      const options = [`<option value="">${escapeHtml(placeholder)}</option>`];
      for (const value of values || []) {
        const selected = value === selectedValue ? " selected" : "";
        options.push(`<option value="${escapeHtml(value)}"${selected}>${escapeHtml(value)}</option>`);
      }
      return options.join("");
    }

    function populateFilterSelect(selectEl, values, selectedValue, placeholder) {
      selectEl.innerHTML = buildSelectOptions(values, selectedValue, placeholder);
    }

    async function ensureNoteOptionsLoaded() {
      if (state.noteOptions) {
        return state.noteOptions;
      }

      const response = await fetch("/api/notes/options");
      if (!response.ok) {
        throw new Error("Failed to load note options");
      }

      state.noteOptions = await response.json();
      populateFilterSelect(noteRoleInput, state.noteOptions.roles, state.noteRole, "Any role");
      populateFilterSelect(noteCategoryInput, state.noteOptions.categories, state.noteCategory, "Any category");
      populateFilterSelect(noteModelTypeInput, state.noteOptions.modelTypes, state.noteModelType, "Any model type");
      return state.noteOptions;
    }

    function syncStateFromInputs() {
      state.task = taskInput.value.trim();
      state.author = authorInput.value.trim();
      state.library = libraryInput.value.trim();
      state.pageSize = Number(pageSizeInput.value || 25);
      state.minDownloads = minDownloadsInput.value;
      state.maxDownloads = maxDownloadsInput.value;
      state.minLikes = minLikesInput.value;
      state.maxLikes = maxLikesInput.value;
      state.noteRole = noteRoleInput.value;
      state.noteCategory = noteCategoryInput.value;
      state.noteModelType = noteModelTypeInput.value;
      state.minRanking = minRankingInput.value;
      state.maxRanking = maxRankingInput.value;
      state.noteText = noteTextInput.value.trim();
    }

    function applyStateToInputs() {
      taskInput.value = state.task;
      authorInput.value = state.author;
      libraryInput.value = state.library;
      pageSizeInput.value = String(state.pageSize);
      minDownloadsInput.value = state.minDownloads;
      maxDownloadsInput.value = state.maxDownloads;
      minLikesInput.value = state.minLikes;
      maxLikesInput.value = state.maxLikes;
      minRankingInput.value = state.minRanking;
      maxRankingInput.value = state.maxRanking;
      noteTextInput.value = state.noteText;

      if (state.noteOptions) {
        populateFilterSelect(noteRoleInput, state.noteOptions.roles, state.noteRole, "Any role");
        populateFilterSelect(noteCategoryInput, state.noteOptions.categories, state.noteCategory, "Any category");
        populateFilterSelect(noteModelTypeInput, state.noteOptions.modelTypes, state.noteModelType, "Any model type");
      }
    }

    function persistState() {
      const snapshot = {
        query: queryInput.value.trim(),
        task: state.task,
        author: state.author,
        library: state.library,
        minDownloads: state.minDownloads,
        maxDownloads: state.maxDownloads,
        minLikes: state.minLikes,
        maxLikes: state.maxLikes,
        noteRole: state.noteRole,
        noteCategory: state.noteCategory,
        noteModelType: state.noteModelType,
        minRanking: state.minRanking,
        maxRanking: state.maxRanking,
        noteText: state.noteText,
        pageSize: String(state.pageSize),
        sortBy: state.sortBy,
        sortDir: state.sortDir,
        page: String(state.page),
        cacheKey: state.cacheKey,
      };

      localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));

      const params = new URLSearchParams();
      for (const [key, value] of Object.entries(snapshot)) {
        if (value) {
          params.set(key, value);
        }
      }

      const nextUrl = params.toString() ? `?${params.toString()}` : window.location.pathname;
      history.replaceState(null, "", nextUrl);
    }

    function hydrateState() {
      const urlParams = new URLSearchParams(window.location.search);
      let savedState = {};

      try {
        savedState = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        savedState = {};
      }

      const getValue = (key, fallback = "") => {
        if (urlParams.has(key)) {
          return urlParams.get(key) || fallback;
        }
        const saved = savedState[key];
        return saved === undefined || saved === null ? fallback : String(saved);
      };

      queryInput.value = getValue("query");
      state.task = getValue("task");
      state.author = getValue("author");
      state.library = getValue("library");
      state.minDownloads = getValue("minDownloads");
      state.maxDownloads = getValue("maxDownloads");
      state.minLikes = getValue("minLikes");
      state.maxLikes = getValue("maxLikes");
      state.noteRole = getValue("noteRole");
      state.noteCategory = getValue("noteCategory");
      state.noteModelType = getValue("noteModelType");
      state.minRanking = getValue("minRanking");
      state.maxRanking = getValue("maxRanking");
      state.noteText = getValue("noteText");
      state.pageSize = Number(getValue("pageSize", "25")) || 25;
      state.sortBy = getValue("sortBy", "downloads");
      state.sortDir = getValue("sortDir", "desc") === "asc" ? "asc" : "desc";
      state.page = Number(getValue("page", "1")) || 1;
      state.cacheKey = getValue("cacheKey");
      state.hasData = Boolean(state.cacheKey);
    }

    function toQueryParams(includePaging = true) {
      const params = new URLSearchParams();

      params.set("cache_key", state.cacheKey);

      if (state.task) params.set("task", state.task);
      if (state.author) params.set("author", state.author);
      if (state.library) params.set("library", state.library);
      if (state.minDownloads) params.set("min_downloads", state.minDownloads);
      if (state.maxDownloads) params.set("max_downloads", state.maxDownloads);
      if (state.minLikes) params.set("min_likes", state.minLikes);
      if (state.maxLikes) params.set("max_likes", state.maxLikes);
      if (state.noteRole) params.set("note_role", state.noteRole);
      if (state.noteCategory) params.set("note_category", state.noteCategory);
      if (state.noteModelType) params.set("note_model_type", state.noteModelType);
      if (state.minRanking) params.set("min_ranking", state.minRanking);
      if (state.maxRanking) params.set("max_ranking", state.maxRanking);
      if (state.noteText) params.set("note_text", state.noteText);
      params.set("note_role_category_mode", "or");

      params.set("sort_by", state.sortBy);
      params.set("sort_dir", state.sortDir);

      if (includePaging) {
        params.set("page", String(state.page));
        params.set("page_size", String(state.pageSize));
      }

      return params;
    }

    function renderSummary(payload) {
      summaryTotalRecordsEl.textContent = String(payload.totalRecords || 0);
      summaryTotalModelsEl.textContent = String(payload.totalModels || 0);

      const models = payload.topModels || [];
      if (!models.length) {
        summaryTopModelsEl.innerHTML = '<li class="summary-item">No stored records yet.</li>';
        return;
      }

      summaryTopModelsEl.innerHTML = models
        .map((item) => `
          <li class="summary-item">
            <div class="summary-item-model">${escapeHtml(item.modelId)}</div>
            <div class="summary-item-meta">
              <span>${escapeHtml(item.noteCount)} entries</span>
              <span>avg ${escapeHtml(formatAverageRanking(item.averageRanking))}</span>
            </div>
          </li>
        `)
        .join("");
    }

    async function loadSummary() {
      try {
        const response = await fetch("/api/records/summary");
        if (!response.ok) {
          throw new Error("Failed to load records summary");
        }
        const payload = await response.json();
        renderSummary(payload);
      } catch {
        summaryTopModelsEl.innerHTML = '<li class="summary-item">Unable to load summary.</li>';
      }
    }

    function formatAverageRanking(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) {
        return "-";
      }
      return Number(value).toFixed(2);
    }

    function formatNoteDate(value) {
      if (!value) {
        return "";
      }
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) {
        return escapeHtml(value);
      }
      return escapeHtml(parsed.toLocaleString());
    }

    function renderNoteBlocks(note) {
      const blocks = [
        ["Notes", note.noteText],
        ["Pros", note.pros],
        ["Cons", note.cons],
        ["Context", note.contextText],
      ];

      return blocks
        .filter(([, value]) => value)
        .map(([label, value]) => `
          <div class="panel-note-block">
            <strong>${escapeHtml(label)}</strong>
            <p>${escapeHtml(value)}</p>
          </div>
        `)
        .join("");
    }

    function renderNotesList(notes) {
      if (!notes.length) {
        return '<div class="panel-empty">No notes recorded yet for this model.</div>';
      }

      return `
        <div class="panel-note-list">
          ${notes.map((note) => `
            <div class="panel-note-card">
              <div class="panel-note-header">
                <div class="panel-note-tags">
                  <span class="note-tag">${escapeHtml(note.role)}</span>
                  <span class="note-tag">${escapeHtml(note.category)}</span>
                  <span class="note-tag">${escapeHtml(note.modelType)}</span>
                  <span class="ranking-badge">rank ${escapeHtml(note.ranking)}</span>
                </div>
                <div class="panel-note-created">${formatNoteDate(note.createdAt)}</div>
              </div>
              ${renderNoteBlocks(note)}
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderDetailPanel(item, notesPayload = { items: [], summary: {} }, loading = false) {
      const hfUrl = item.modelId ? `https://huggingface.co/${encodeURIComponent(item.modelId).replaceAll("%2F", "/")}` : null;
      const summary = notesPayload.summary || {};
      const options = state.noteOptions || { roles: [], categories: [], modelTypes: [] };

      panelBody.innerHTML = `
        <div class="panel-field">
          <div class="panel-field-label">Model ID</div>
          <div class="panel-field-value">${escapeHtml(item.modelId || "-")}</div>
        </div>
        <div class="panel-field">
          <div class="panel-field-label">Author</div>
          <div class="panel-field-value">${escapeHtml(item.author || "-")}</div>
        </div>
        <div class="panel-field">
          <div class="panel-field-label">Downloads</div>
          <div class="panel-field-value">${(item.downloads ?? 0).toLocaleString()}</div>
        </div>
        <div class="panel-field">
          <div class="panel-field-label">Likes</div>
          <div class="panel-field-value">${(item.likes ?? 0).toLocaleString()}</div>
        </div>
        <div class="panel-field">
          <div class="panel-field-label">Task</div>
          <div class="panel-field-value">${escapeHtml(item.pipeline_tag || "-")}</div>
        </div>
        <div class="panel-field">
          <div class="panel-field-label">Library</div>
          <div class="panel-field-value">${escapeHtml(item.library_name || "-")}</div>
        </div>
        <div class="panel-field">
          <div class="panel-field-label">Note Summary</div>
          <div class="note-meta">
            <span class="note-badge">${escapeHtml(summary.note_count ?? item.note_count ?? 0)} notes</span>
            <span class="ranking-badge">avg ${escapeHtml(formatAverageRanking(summary.average_ranking ?? item.average_ranking))}</span>
          </div>
        </div>
        ${hfUrl ? `<a href="${hfUrl}" target="_blank" rel="noopener noreferrer" class="panel-hf-link">View on Hugging Face <span>↗</span></a>` : ""}

        <div class="panel-section">
          <div class="panel-section-title">Add Evaluation Entry</div>
          <div class="panel-grid">
            <div class="field">
              <label for="detail-role">Role</label>
              <select id="detail-role">${buildSelectOptions(options.roles, options.roles[0] || "", "Select role")}</select>
            </div>
            <div class="field">
              <label for="detail-category">Category</label>
              <select id="detail-category">${buildSelectOptions(options.categories, options.categories[0] || "", "Select category")}</select>
            </div>
            <div class="field">
              <label for="detail-model-type">Model Type</label>
              <select id="detail-model-type">${buildSelectOptions(options.modelTypes, options.modelTypes[0] || "", "Select model type")}</select>
            </div>
            <div class="field">
              <label for="detail-ranking">Ranking</label>
              <input id="detail-ranking" type="number" min="1" max="10" value="7" />
            </div>
            <div class="field full">
              <label for="detail-note-text">Notes</label>
              <textarea id="detail-note-text" rows="4" placeholder="What makes this model a fit for this role?"></textarea>
            </div>
            <div class="field full">
              <label for="detail-pros">Pros</label>
              <textarea id="detail-pros" rows="3" placeholder="Strengths, wins, or standout behavior"></textarea>
            </div>
            <div class="field full">
              <label for="detail-cons">Cons</label>
              <textarea id="detail-cons" rows="3" placeholder="Weaknesses, caveats, or blockers"></textarea>
            </div>
            <div class="field full">
              <label for="detail-context-text">Context / Use Case</label>
              <textarea id="detail-context-text" rows="3" placeholder="Deployment target, benchmark setup, or stack context"></textarea>
            </div>
          </div>
          <div class="panel-helper-text">Entries are append-only. Use a new record for each evaluation pass, role, or category change.</div>
          <div class="panel-actions">
            <button class="primary" id="save-note-btn">Save Entry</button>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-section-title">Entry History</div>
          ${loading ? '<div class="panel-empty">Loading notes...</div>' : renderNotesList(notesPayload.items || [])}
        </div>
      `;

      const saveButton = document.getElementById("save-note-btn");
      if (saveButton) {
        saveButton.addEventListener("click", async () => {
          try {
            await saveNote(item);
          } catch (error) {
            setError(error.message);
          }
        });
      }
    }

    async function openDetailPanel(item) {
      state.activeModel = item;
      document.getElementById("detail-panel").classList.add("open");
      document.getElementById("panel-backdrop").classList.add("open");
      document.body.style.overflow = "hidden";

      await ensureNoteOptionsLoaded();
      renderDetailPanel(item, { items: [], summary: { note_count: item.note_count, average_ranking: item.average_ranking } }, true);

      const response = await fetch(`/api/notes/${encodeURIComponent(item.modelId).replaceAll("%2F", "/")}`);
      if (!response.ok) {
        throw new Error("Failed to load notes for the selected model");
      }

      const payload = await response.json();
      if (state.activeModel?.modelId === item.modelId) {
        renderDetailPanel(item, payload, false);
      }
    }

    function closeDetailPanel() {
      state.activeModel = null;
      document.getElementById("detail-panel").classList.remove("open");
      document.getElementById("panel-backdrop").classList.remove("open");
      document.body.style.overflow = "";
    }

    async function saveNote(item) {
      const payload = {
        role: document.getElementById("detail-role").value,
        category: document.getElementById("detail-category").value,
        model_type: document.getElementById("detail-model-type").value,
        ranking: Number(document.getElementById("detail-ranking").value || 0),
        note_text: document.getElementById("detail-note-text").value,
        pros: document.getElementById("detail-pros").value,
        cons: document.getElementById("detail-cons").value,
        context_text: document.getElementById("detail-context-text").value,
      };

      const response = await fetch(`/api/notes/${encodeURIComponent(item.modelId).replaceAll("%2F", "/")}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!response.ok) {
        const errorBody = await response.json();
        throw new Error(errorBody.detail || "Failed to save note entry");
      }

      const result = await response.json();
      renderDetailPanel(item, result, false);
      setMessage("Note entry saved.");

      if (state.hasData && state.cacheKey) {
        try {
          await fetchResults();
        } catch {
          // Keep panel usable even if the background refresh fails.
        }
      }

      loadSummary();
    }

    function renderRows(items) {
      resultsBody.innerHTML = "";

      if (!items.length) {
        const row = document.createElement("tr");
        row.innerHTML = '<td colspan="6" style="text-align: center; color: var(--text-tertiary); padding: 24px;">No results found for the current filters.</td>';
        resultsBody.appendChild(row);
        return;
      }

      for (const item of items) {
        const row = document.createElement("tr");
        row.className = "clickable-row";
        row.innerHTML = `
          <td class="model-cell">
            <div class="model-cell-main">
              <span class="model-id-text">${escapeHtml(item.modelId || "-")}</span>
              ${(item.note_count ?? 0) > 0 ? `
                <div class="note-meta">
                  <span class="note-badge">${escapeHtml(item.note_count)} notes</span>
                  <span class="ranking-badge">avg ${escapeHtml(formatAverageRanking(item.average_ranking))}</span>
                </div>
              ` : ""}
            </div>
            <span class="row-indicator" aria-hidden="true" title="View details">›</span>
          </td>
          <td>${escapeHtml(item.author || "-")}</td>
          <td>${(item.downloads ?? 0).toLocaleString()}</td>
          <td>${(item.likes ?? 0).toLocaleString()}</td>
          <td>${escapeHtml(item.pipeline_tag || "-")}</td>
          <td>${escapeHtml(item.library_name || "-")}</td>
        `;
        row.addEventListener("click", () => {
          openDetailPanel(item).catch((error) => setError(error.message));
        });
        resultsBody.appendChild(row);
      }
    }

    function updateMeta(meta) {
      state.page = meta.page;
      state.totalPages = meta.totalPages;
      statusEl.textContent = `${meta.totalFetched.toLocaleString()} fetched | ${meta.totalFiltered.toLocaleString()} filtered | Page ${meta.page}/${meta.totalPages} | ${meta.pageSize}/page`;
    }

    async function fetchResults() {
      if (!state.hasData || !state.cacheKey) {
        setError("Run a search before filtering.");
        return;
      }

      syncStateFromInputs();
      setError("");
      setMessage("Applying filters and loading page...");

      if (resultsController) {
        resultsController.abort();
      }
      resultsController = new AbortController();

      setLoading(true);
      try {
        const response = await fetch(`/api/results?${toQueryParams(true)}`, {
          signal: resultsController.signal,
        });
        if (!response.ok) {
          const errorBody = await response.json();
          throw new Error(errorBody.detail || "Failed to load results");
        }

        const payload = await response.json();
        renderRows(payload.items);
        updateMeta(payload.meta);
        setMessage("Results updated.");
        persistState();
      } catch (error) {
        if (error.name !== "AbortError") {
          throw error;
        }
      } finally {
        setLoading(false);
      }
    }

    async function runSearch() {
      const query = queryInput.value.trim();
      if (!query) {
        setError("Please enter a search query.");
        return;
      }

      syncStateFromInputs();
      state.page = 1;
      setError("");
      setMessage("Fetching models from Hugging Face...");

      if (searchController) {
        searchController.abort();
      }
      searchController = new AbortController();

      setLoading(true);
      try {
        const response = await fetch("/api/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          signal: searchController.signal,
          body: JSON.stringify({
            query,
            task: state.task || null,
            author: state.author || null,
            library: state.library || null,
          }),
        });

        if (!response.ok) {
          const errorBody = await response.json();
          throw new Error(errorBody.detail || "Search failed");
        }

        const payload = await response.json();
        state.cacheKey = payload.cacheKey || "";
        state.hasData = Boolean(state.cacheKey);
        renderRows(payload.items);
        updateMeta(payload.meta);
        setMessage("Search completed.");
        persistState();
      } catch (error) {
        if (error.name !== "AbortError") {
          throw error;
        }
      } finally {
        setLoading(false);
      }
    }

    async function resetAll() {
      if (searchController) {
        searchController.abort();
      }
      if (resultsController) {
        resultsController.abort();
      }

      const params = new URLSearchParams();
      if (state.cacheKey) {
        params.set("cache_key", state.cacheKey);
      }
      const suffix = params.toString() ? `?${params.toString()}` : "";
      await fetch(`/api/reset${suffix}`, { method: "POST" });

      state.hasData = false;
      state.cacheKey = "";
      state.page = 1;
      state.totalPages = 1;
      state.sortBy = "downloads";
      state.sortDir = "desc";
      state.task = "";
      state.author = "";
      state.library = "";
      state.minDownloads = "";
      state.maxDownloads = "";
      state.minLikes = "";
      state.maxLikes = "";
      state.noteRole = "";
      state.noteCategory = "";
      state.noteModelType = "";
      state.minRanking = "";
      state.maxRanking = "";
      state.noteText = "";
      state.pageSize = 25;

      queryInput.value = "";
      applyStateToInputs();

      resultsBody.innerHTML = "";
      statusEl.textContent = "No results loaded.";
      setError("");
      setMessage("State reset.");

      localStorage.removeItem(STORAGE_KEY);
      history.replaceState(null, "", window.location.pathname);
      closeDetailPanel();
      loadSummary();
    }

    function exportData(scope, fmt) {
      if (!state.hasData || !state.cacheKey) {
        setError("Run a search before exporting.");
        return;
      }
      setError("");
      syncStateFromInputs();
      const params = toQueryParams(false);
      params.set("fmt", fmt);
      window.open(`/api/export/${scope}?${params.toString()}`, "_blank");
    }

    function debounceFetchResults() {
      clearTimeout(applyDebounceTimer);
      applyDebounceTimer = setTimeout(async () => {
        try {
          await fetchResults();
        } catch (error) {
          setError(error.message);
        }
      }, DEBOUNCE_MS);
    }

    document.getElementById("search-btn").addEventListener("click", async () => {
      try {
        await runSearch();
      } catch (error) {
        setError(error.message);
      }
    });

    document.getElementById("apply-btn").addEventListener("click", () => {
      if (!state.hasData || !state.cacheKey) {
        setError("Run a search before filtering.");
        return;
      }
      syncStateFromInputs();
      state.page = 1;
      debounceFetchResults();
    });

    document.getElementById("prev-page").addEventListener("click", async () => {
      if (!state.hasData || state.page <= 1) return;
      state.page -= 1;
      try {
        await fetchResults();
      } catch (error) {
        setError(error.message);
      }
    });

    document.getElementById("next-page").addEventListener("click", async () => {
      if (!state.hasData || state.page >= state.totalPages) return;
      state.page += 1;
      try {
        await fetchResults();
      } catch (error) {
        setError(error.message);
      }
    });

    document.getElementById("reset-btn").addEventListener("click", async () => {
      try {
        await resetAll();
      } catch (error) {
        setError(error.message);
      }
    });

    pageSizeInput.addEventListener("change", async () => {
      if (!state.hasData || !state.cacheKey) return;
      syncStateFromInputs();
      state.page = 1;
      try {
        await fetchResults();
      } catch (error) {
        setError(error.message);
      }
    });

    document.querySelectorAll("th button[data-sort]").forEach((button) => {
      button.addEventListener("click", async () => {
        const sortBy = button.getAttribute("data-sort");
        if (state.sortBy === sortBy) {
          state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
        } else {
          state.sortBy = sortBy;
          state.sortDir = "asc";
        }

        if (!state.hasData || !state.cacheKey) return;
        try {
          await fetchResults();
        } catch (error) {
          setError(error.message);
        }
      });
    });

    document.getElementById("export-full-json").addEventListener("click", () => exportData("full", "json"));
    document.getElementById("export-full-csv").addEventListener("click", () => exportData("full", "csv"));
    document.getElementById("export-filtered-json").addEventListener("click", () => exportData("filtered", "json"));
    document.getElementById("export-filtered-csv").addEventListener("click", () => exportData("filtered", "csv"));

    document.getElementById("panel-close").addEventListener("click", closeDetailPanel);
    document.getElementById("panel-backdrop").addEventListener("click", closeDetailPanel);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeDetailPanel();
    });

    hydrateState();

    (async () => {
      try {
        await ensureNoteOptionsLoaded();
        applyStateToInputs();
      } catch (error) {
        setError(error.message);
      }

      loadSummary();

      if (state.cacheKey && queryInput.value.trim()) {
        fetchResults().catch(() => {
          state.hasData = false;
          state.cacheKey = "";
          setMessage("Saved filters restored. Run search to refresh results.");
          persistState();
        });
      }
    })();
  </script>
</body>
</html>
