<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — HF Model Exporter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --site-max-width: 1280px;
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #64748b;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --accent-primary: #0066cc;
      --accent-primary-hover: #004f9e;
      --danger: #ef4444;
      --success: #10b981;
      --shadow-sm: 0 1px 2px 0 rgba(0,0,0,.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -2px rgba(0,0,0,.1);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.1), 0 8px 10px -6px rgba(0,0,0,.1);
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    html[data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-tertiary: #94a3b8;
      --border: #334155;
      --border-light: #1e293b;
      --accent-primary: #3b82f6;
      --accent-primary-hover: #2563eb;
      --danger: #f87171;
      --success: #10b981;
      --shadow-sm: 0 1px 2px 0 rgba(0,0,0,.3);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.3), 0 2px 4px -2px rgba(0,0,0,.3);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.3), 0 8px 10px -6px rgba(0,0,0,.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-primary);
      background: var(--bg-secondary);
      transition: var(--transition);
      line-height: 1.6;
    }
    .container {
      max-width: var(--site-max-width);
      margin: 0 auto;
      padding: 28px 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      gap: 16px;
    }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .nav-link {
      display: inline-flex;
      align-items: center;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
      transition: var(--transition);
    }
    .nav-link:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
    .settings-trigger {
      width: 40px; height: 40px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg-primary); color: var(--text-secondary);
      font-size: 1.1rem; cursor: pointer; transition: var(--transition);
    }
    .settings-trigger:hover { border-color: var(--accent-primary); color: var(--accent-primary); box-shadow: var(--shadow-md); }
    .card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
    }
    h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
    label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
    input {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: var(--transition);
      width: 100%;
    }
    input:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(0,102,204,.1); }
    html[data-theme="dark"] input:focus { box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
    input::placeholder { color: var(--text-tertiary); }
    button {
      padding: 10px 16px;
      border: 1.5px solid transparent;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    button:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent-primary); color: #fff; border-color: var(--accent-primary); }
    .btn-primary:hover { opacity: 0.9; box-shadow: var(--shadow-md); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: white; }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
    .field { margin-bottom: 14px; }
    .form-row { display: flex; gap: 10px; align-items: flex-end; }
    .form-row .field { flex: 1; margin-bottom: 0; }
    .project-list { display: grid; gap: 12px; }
    .project-card {
      background: var(--bg-primary);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: var(--transition);
    }
    .project-card.active {
      border-color: var(--accent-primary);
      background: var(--bg-secondary);
    }
    .project-card:hover { box-shadow: var(--shadow-md); }
    .project-info { flex: 1; min-width: 0; }
    .project-name {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .active-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-primary);
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .project-meta {
      font-size: 0.82rem;
      color: var(--text-tertiary);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .project-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      color: white;
      box-shadow: var(--shadow-xl);
      animation: slideIn 0.2s ease;
      pointer-events: auto;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-tertiary);
    }
    .error-text { color: var(--danger); font-size: 0.85rem; margin-top: 6px; }
    .help-text { font-size: 0.82rem; color: var(--text-tertiary); margin-top: 6px; }

    /* Site settings panel (copied from index.html for cross-tab sync) */
    .site-settings-backdrop {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.45);
      opacity: 0; pointer-events: none;
      transition: var(--transition); z-index: 98;
    }
    .site-settings-backdrop.open { opacity: 1; pointer-events: auto; }
    .site-settings-panel {
      position: fixed; top: 0; right: 0;
      height: 100vh; width: min(440px, 100vw);
      background: var(--bg-primary);
      border-left: 1px solid var(--border);
      box-shadow: var(--shadow-xl);
      transform: translateX(100%);
      transition: transform 0.24s ease;
      z-index: 99;
      display: flex; flex-direction: column;
    }
    .site-settings-panel.open { transform: translateX(0); }
    .site-settings-panel-header {
      padding: 18px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
    }
    .site-settings-panel-header h2 { font-size: 1.02rem; margin: 0; }
    .site-settings-panel-body {
      flex: 1; overflow-y: auto; padding: 18px;
      display: grid; gap: 12px; align-content: start;
    }
    .site-settings-meta {
      color: var(--text-secondary); font-size: 0.85rem;
      padding: 10px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg-secondary); line-height: 1.5;
    }
    .site-width-value { font-size: 0.82rem; color: var(--text-secondary); margin-top: 4px; }
    .site-width-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .site-width-presets button { padding: 6px 10px; font-size: 0.8rem; border-radius: 999px; }
    .site-settings-panel-footer {
      padding: 14px 18px; border-top: 1px solid var(--border);
      background: var(--bg-primary); display: grid; gap: 10px;
    }
    input[type="range"] {
      width: 100%; padding: 0; border: none; box-shadow: none;
      background: transparent; cursor: pointer; height: 20px;
    }
    input[type="range"]:focus { box-shadow: none; border-color: transparent; }
    .theme-toggle { display: flex; gap: 8px; }
    .theme-toggle button {
      flex: 1; padding: 8px 12px; border-radius: 8px; font-size: 0.82rem;
      background: var(--bg-tertiary); color: var(--text-secondary);
      border-color: var(--border);
    }
    .theme-toggle button.active-theme {
      background: var(--accent-primary); color: white; border-color: var(--accent-primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <h1>📁 Projects</h1>
        <p style="font-size:.95rem;color:var(--text-secondary);">Manage isolated model note collections</p>
      </div>
      <div class="header-actions">
        <a class="nav-link" href="/">Search Page</a>
        <a class="nav-link" href="/records">Records Manager</a>
        <button id="site-settings-open" class="settings-trigger" title="Site settings" aria-label="Open site settings">⚙️</button>
      </div>
    </div>

    <!-- Create new project -->
    <div class="card">
      <h2>New Project</h2>
      <form id="create-form">
        <div class="form-row">
          <div class="field">
            <label for="display-name">Display Name</label>
            <input id="display-name" placeholder="My Research Project" autocomplete="off" required />
          </div>
          <div class="field" style="max-width:220px;">
            <label for="slug-input">Slug (optional)</label>
            <input id="slug-input" placeholder="auto-generated" autocomplete="off" />
          </div>
          <button type="submit" class="btn-primary" id="create-btn">Create</button>
        </div>
        <p class="help-text">Slug: lowercase letters, digits, hyphens, underscores; auto-generated from name if blank.</p>
        <p class="error-text" id="create-error" style="display:none;"></p>
      </form>
    </div>

    <!-- Project list -->
    <div class="card">
      <h2>All Projects</h2>
      <div class="project-list" id="project-list">
        <div class="empty-state">Loading…</div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Site settings panel -->
  <div class="site-settings-backdrop" id="site-settings-backdrop"></div>
  <div class="site-settings-panel" id="site-settings-panel" role="dialog" aria-modal="true" aria-label="Site settings">
    <div class="site-settings-panel-header">
      <h2>⚙️ Site Settings</h2>
      <button id="site-settings-close" class="btn-ghost" style="padding:6px 10px;font-size:.85rem;">✕ Close</button>
    </div>
    <div class="site-settings-panel-body">
      <div>
        <label>Theme</label>
        <div class="theme-toggle">
          <button data-theme-btn="light">☀️ Light</button>
          <button data-theme-btn="dark">🌙 Dark</button>
          <button data-theme-btn="auto">🖥️ Auto</button>
        </div>
      </div>
      <div>
        <label>Max Width: <span id="width-display">1280px</span></label>
        <input type="range" id="width-slider" min="960" max="3200" step="40" value="1280" />
        <p class="site-width-value">Drag to resize the content area</p>
        <div class="site-width-presets">
          <button data-preset="1280" class="btn-ghost">Laptop 1280</button>
          <button data-preset="1440" class="btn-ghost">FHD 1440</button>
          <button data-preset="1720" class="btn-ghost">2K/QHD 1720</button>
          <button data-preset="2160" class="btn-ghost">4K 2160</button>
          <button data-preset="2560" class="btn-ghost">Ultrawide 2560</button>
        </div>
      </div>
    </div>
    <div class="site-settings-panel-footer">
      <div class="site-settings-meta" id="settings-db-path">—</div>
    </div>
  </div>

  <script>
  (() => {
    const SEARCH_STATE_KEY = 'hfExporterState';
    const PROJECT_SWITCH_KEY = 'hfExporterProjectSwitch';

    function broadcastProjectSwitch(project) {
      localStorage.removeItem(SEARCH_STATE_KEY);
      localStorage.setItem(PROJECT_SWITCH_KEY, JSON.stringify({
        projectId: project.id,
        projectName: project.displayName || project.id,
        ts: Date.now(),
      }));
    }

    // ── Site settings (shared across pages) ─────────────────────────────────
    const SETTINGS_KEY = 'hfSiteSettings_v1';
    function loadSettings() {
      try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'); } catch { return {}; }
    }
    function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
    function applySettings(s) {
      const w = s.maxWidth || 1280;
      document.documentElement.style.setProperty('--site-max-width', w + 'px');
      document.getElementById('width-slider').value = w;
      document.getElementById('width-display').textContent = w + 'px';
      const theme = s.theme || 'auto';
      const effective = theme === 'auto'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : theme;
      document.documentElement.setAttribute('data-theme', effective);
      document.querySelectorAll('[data-theme-btn]').forEach(b => {
        b.classList.toggle('active-theme', b.dataset.themeBtn === theme);
      });
    }
    const initialSettings = loadSettings();
    applySettings(initialSettings);

    const slider = document.getElementById('width-slider');
    slider.addEventListener('input', () => {
      const s = loadSettings(); s.maxWidth = +slider.value;
      saveSettings(s); applySettings(s);
    });
    document.querySelectorAll('[data-theme-btn]').forEach(btn => {
      btn.addEventListener('click', () => {
        const s = loadSettings(); s.theme = btn.dataset.themeBtn;
        saveSettings(s); applySettings(s);
      });
    });
    document.querySelectorAll('[data-preset]').forEach(btn => {
      btn.addEventListener('click', () => {
        const s = loadSettings(); s.maxWidth = +btn.dataset.preset;
        saveSettings(s); applySettings(s);
      });
    });
    window.addEventListener('storage', e => { if (e.key === SETTINGS_KEY) applySettings(loadSettings()); });

    const settingsPanel = document.getElementById('site-settings-panel');
    const settingsBackdrop = document.getElementById('site-settings-backdrop');
    document.getElementById('site-settings-open').addEventListener('click', () => {
      settingsPanel.classList.add('open'); settingsBackdrop.classList.add('open');
    });
    const closeSettings = () => { settingsPanel.classList.remove('open'); settingsBackdrop.classList.remove('open'); };
    document.getElementById('site-settings-close').addEventListener('click', closeSettings);
    settingsBackdrop.addEventListener('click', closeSettings);

    // ── Toast ────────────────────────────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // ── Projects ─────────────────────────────────────────────────────────────
    let projects = [];

    async function loadProjects() {
      const res = await fetch('/api/projects');
      const data = await res.json();
      projects = data.items || [];
      renderProjects();
      // update db path in settings panel
      const active = projects.find(p => p.isActive);
      if (active) document.getElementById('settings-db-path').textContent = active.databasePath;
    }

    function renderProjects() {
      const list = document.getElementById('project-list');
      if (!projects.length) {
        list.innerHTML = '<div class="empty-state">No projects found.</div>';
        return;
      }
      list.innerHTML = projects.map(p => `
        <div class="project-card${p.isActive ? ' active' : ''}" data-id="${esc(p.id)}">
          <div class="project-info">
            <div class="project-name">
              ${esc(p.displayName)}
              ${p.isActive ? '<span class="active-badge">Active</span>' : ''}
            </div>
            <div class="project-meta">
              slug: ${esc(p.id)}
              ${p.createdAt ? ' · created ' + new Date(p.createdAt).toLocaleDateString() : ''}
            </div>
          </div>
          <div class="project-actions">
            ${!p.isActive ? `<button class="btn-primary" data-activate="${esc(p.id)}">Activate</button>` : ''}
            ${p.id !== 'default' ? `<button class="btn-danger" data-delete="${esc(p.id)}" data-name="${esc(p.displayName)}">Delete</button>` : ''}
          </div>
        </div>
      `).join('');

      list.querySelectorAll('[data-activate]').forEach(btn => {
        btn.addEventListener('click', () => activateProject(btn.dataset.activate));
      });
      list.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', () => deleteProject(btn.dataset.delete, btn.dataset.name));
      });
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function activateProject(slug) {
      const res = await fetch(`/api/projects/${encodeURIComponent(slug)}/activate`, { method: 'POST' });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showToast(err.detail || 'Failed to activate', 'error');
        return;
      }
      const project = await res.json();
      broadcastProjectSwitch(project);
      showToast('Project activated');
      await loadProjects();
    }

    async function deleteProject(slug, name) {
      if (!confirm(`Delete project "${name}" (slug: ${slug})?\n\nThis permanently deletes all notes in this project. This cannot be undone.`)) return;
      const res = await fetch(`/api/projects/${encodeURIComponent(slug)}`, { method: 'DELETE' });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showToast(err.detail || 'Failed to delete', 'error');
        return;
      }
      showToast('Project deleted');
      await loadProjects();
    }

    // ── Create form ──────────────────────────────────────────────────────────
    document.getElementById('create-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('create-error');
      errEl.style.display = 'none';
      const displayName = document.getElementById('display-name').value.trim();
      const slug = document.getElementById('slug-input').value.trim() || null;
      if (!displayName) return;
      const btn = document.getElementById('create-btn');
      btn.disabled = true;
      try {
        const res = await fetch('/api/projects', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ displayName, slug, autoActivate: true }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          errEl.textContent = err.detail || 'Failed to create project';
          errEl.style.display = 'block';
          return;
        }
        const project = await res.json();
        document.getElementById('display-name').value = '';
        document.getElementById('slug-input').value = '';
        broadcastProjectSwitch(project);
        showToast('Project created and activated');
        await loadProjects();
      } finally {
        btn.disabled = false;
      }
    });

    loadProjects();
  })();
  </script>
</body>
</html>
