services:
  hf-exporter:
    build: .
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_EXPORTER_DB_PATH=/storage/hf_exporter.db
    volumes:
      - ./exports:/output
      - ./storage:/storage
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash"]
    command: []

  hf-exporter-cli:
    build: .
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_EXPORTER_DB_PATH=/storage/hf_exporter.db
    volumes:
      - ./exports:/output
      - ./storage:/storage
    entrypoint: ["uv", "run", "hf"]
    command: ["hf", "--help"]

  hf-cli:
    build: .
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-False}
      - HF_HUB_DISABLE_TELEMETRY=${HF_HUB_DISABLE_TELEMETRY:-True}
      - HF_HUB_DISABLE_PROGRESS_BARS=${HF_HUB_DISABLE_PROGRESS_BARS:-}
      - HF_HUB_DISABLE_SYMLINKS_WARNING=${HF_HUB_DISABLE_SYMLINKS_WARNING:-False}
      - HF_HUB_DISABLE_EXPERIMENTAL_WARNING=${HF_HUB_DISABLE_EXPERIMENTAL_WARNING:-False}
      - HF_HUB_DISABLE_IMPLICIT_TOKEN=${HF_HUB_DISABLE_IMPLICIT_TOKEN:-False}
      - HF_HUB_DISABLE_XET=${HF_HUB_DISABLE_XET:-False}
      - HF_HUB_ETAG_TIMEOUT=${HF_HUB_ETAG_TIMEOUT:-10}
      - HF_HUB_DOWNLOAD_TIMEOUT=${HF_HUB_DOWNLOAD_TIMEOUT:-10}
      - HF_HUB_CACHE=/app/.cache/huggingface/hub
      - HF_ASSETS_CACHE=/app/.cache/huggingface/assets
      - HF_TOKEN_PATH=/app/.cache/huggingface/token
      # https://huggingface.co/docs/huggingface_hub/v1.12.1/en/package_reference/environment_variables
    volumes:
      - ./storage/.cache/hf-cli/assets:/app/.cache/huggingface/assets
      - ./storage/.cache/hf-cli/hub:/app/.cache/huggingface/hub
      - ./storage/.cache/hf-cli/token:/app/.cache/huggingface/token
    stdin_open: true
    tty: true
    entrypoint:
      [
        "sh",
        "-lc",
          "mkdir -p /app/.cache/huggingface/assets /app/.cache/huggingface/hub /app/.cache/huggingface/token  && /bin/bash"
      ]
    command: ["--help"]

  hf-exporter-web:
    build: .
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_EXPORTER_STORAGE_DIR=/storage
    ports:
      - "8111:8000"
    volumes:
      - ./exports:/output
      - ./storage:/storage
    entrypoint: ["uv", "run", "uvicorn"]
    command: ["hf_exporter.web:app", "--host", "0.0.0.0", "--port", "8000"]
