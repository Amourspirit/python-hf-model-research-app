services:
  hf-exporter:
    build: .
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./exports:/output
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash"]
    command: []

  hf-exporter-cli:
    build: .
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./exports:/output
    command: ["--help"]
