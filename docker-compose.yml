services:
  hf-exporter:
    build: .
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_EXPORTER_DB_PATH=/storage/hf_exporter.db
    volumes:
      - ./exports:/output
      - ./storage:/storage
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash"]
    command: []

  hf-exporter-cli:
    build: .
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_EXPORTER_DB_PATH=/storage/hf_exporter.db
    volumes:
      - ./exports:/output
      - ./storage:/storage
    command: ["--help"]

  hf-exporter-web:
    build: .
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_EXPORTER_STORAGE_DIR=/storage
    ports:
      - "8111:8000"
    volumes:
      - ./exports:/output
      - ./storage:/storage
    entrypoint: ["uv", "run", "uvicorn"]
    command: ["hf_exporter.web:app", "--host", "0.0.0.0", "--port", "8000"]
