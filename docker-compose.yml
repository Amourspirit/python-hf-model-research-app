services:
  hf-exporter:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_EXPORTER_DB_PATH=/storage/hf_exporter.db
    volumes:
      - ${HF_EXPORTS_HOST_DIR:-./exports}:/output
      - ${HF_STORAGE_HOST_DIR:-./storage}:/storage
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash"]
    command: []

  hf-exporter-cli:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_EXPORTER_DB_PATH=/storage/hf_exporter.db
    volumes:
      - ${HF_EXPORTS_HOST_DIR:-./exports}:/output
      - ${HF_STORAGE_HOST_DIR:-./storage}:/storage
    command: ["--help"]

  hf-shell:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-False}
      - HF_HUB_DISABLE_TELEMETRY=${HF_HUB_DISABLE_TELEMETRY:-True}
      - HF_HUB_DISABLE_PROGRESS_BARS=${HF_HUB_DISABLE_PROGRESS_BARS:-}
      - HF_HUB_DISABLE_SYMLINKS_WARNING=${HF_HUB_DISABLE_SYMLINKS_WARNING:-False}
      - HF_HUB_DISABLE_EXPERIMENTAL_WARNING=${HF_HUB_DISABLE_EXPERIMENTAL_WARNING:-False}
      - HF_HUB_DISABLE_IMPLICIT_TOKEN=${HF_HUB_DISABLE_IMPLICIT_TOKEN:-False}
      - HF_HUB_DISABLE_XET=${HF_HUB_DISABLE_XET:-False}
      - HF_HUB_ETAG_TIMEOUT=${HF_HUB_ETAG_TIMEOUT:-10}
      - HF_HUB_DOWNLOAD_TIMEOUT=${HF_HUB_DOWNLOAD_TIMEOUT:-10}
      - HF_HOME=${HF_HOME:-/storage/hf-shell}
      - HF_HUB_CACHE=${HF_HUB_CACHE:-/storage/hf-shell/cache}
      - HF_ASSETS_CACHE=${HF_ASSETS_CACHE:-/storage/hf-shell/assets}
      - HF_TOKEN_PATH=${HF_TOKEN_PATH:-/storage/hf-shell/token}
      - HF_SHELL_DOWNLOAD_DIR=${HF_SHELL_DOWNLOAD_DIR:-/storage/hf-shell/downloads}
      - HF_SHELL_CACHE_DIR=${HF_SHELL_CACHE_DIR:-/storage/hf-shell/cache}
    volumes:
      - ${HF_SHELL_HOST_DIR:-./storage/hf-shell}:/storage/hf-shell
    stdin_open: true
    tty: true
    entrypoint: ["/usr/local/bin/hf-shell-entrypoint"]
    command: []

  hf-exporter-web:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_EXPORTER_STORAGE_DIR=/storage
    ports:
      - "8111:8000"
    volumes:
      - ${HF_EXPORTS_HOST_DIR:-./exports}:/output
      - ${HF_STORAGE_HOST_DIR:-./storage}:/storage
    entrypoint: ["uv", "run", "uvicorn"]
    command: ["hf_exporter.web:app", "--host", "0.0.0.0", "--port", "8000"]
